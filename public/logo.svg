<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AI Safety Tree">
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <g stroke="#000000" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <!-- Right trunk: tall straight stalk, slight right lean. -->
    <path d="M55 92 L60 30"/>
    <!-- Right top Y-fork. -->
    <path d="M60 30 L50 14"/>
    <path d="M60 30 L72 14"/>

    <!-- Left trunk: shorter, leans up-left. -->
    <path d="M48 92 L36 50"/>
    <!-- Mid-offshoot on the inside (right) of the left trunk. -->
    <path d="M41 70 L48 62"/>
    <!-- Small Y-fork at the top of the left trunk. -->
    <path d="M36 50 L28 38"/>
    <path d="M36 50 L42 42"/>
  </g>
</svg>
