<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AI Safety Tree">
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <g stroke="#000000" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <!-- Two parallel trunks at the bottom — they stay together longer now,
         from y=90 up to y=58 before diverging. -->
    <path d="M46 90 L46 58" stroke-width="6"/>
    <path d="M54 90 L54 58" stroke-width="6"/>

    <!-- Left trunk diverges up-left and steeper than the right. -->
    <path d="M46 58 L26 28" stroke-width="6"/>
    <!-- Left mid offshoot — single small branch. -->
    <path d="M36 43 L42 38" stroke-width="4"/>
    <!-- Left top Y-fork. -->
    <path d="M26 28 L18 14" stroke-width="5"/>
    <path d="M26 28 L33 16" stroke-width="5"/>

    <!-- Right trunk diverges up-right at a different (shorter) angle. -->
    <path d="M54 58 L74 36" stroke-width="6"/>
    <!-- Right side has TWO offshoots, asymmetric vs left. -->
    <path d="M62 50 L70 46" stroke-width="4"/>
    <path d="M70 42 L74 38" stroke-width="4"/>
    <!-- Right top Y-fork (different angles). -->
    <path d="M74 36 L82 22" stroke-width="5"/>
    <path d="M74 36 L66 22" stroke-width="5"/>
  </g>
</svg>
