<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AI Safety Tree">
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <g stroke="#000000" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <!-- Two parallel trunk lines at the bottom — straight, vertical. -->
    <path d="M46 88 L46 70" stroke-width="6"/>
    <path d="M54 88 L54 70" stroke-width="6"/>
    <!-- Trunks diverge from the parallel base outward and upward. -->
    <path d="M46 70 L28 38" stroke-width="6"/>
    <path d="M54 70 L72 38" stroke-width="6"/>
    <!-- Small Y branches at the top of each diverged trunk. -->
    <path d="M28 38 L20 22" stroke-width="5"/>
    <path d="M28 38 L36 22" stroke-width="5"/>
    <path d="M72 38 L64 22" stroke-width="5"/>
    <path d="M72 38 L80 22" stroke-width="5"/>
  </g>
</svg>
